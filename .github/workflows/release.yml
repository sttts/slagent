name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute CalVer tag
        id: tag
        run: |
          # v<YYYY>.<M>.<D>-alpha.<counter>  (no leading zeros)
          year=$(date -u +%Y)
          month=$(date -u +%-m)
          day=$(date -u +%-d)
          prefix="v${year}.${month}.${day}-alpha"

          # Find highest existing counter for today
          counter=0
          for t in $(git tag -l "${prefix}.*" | sort -t. -k5 -n); do
            n="${t##*.}"
            if [ "$n" -ge "$counter" ]; then
              counter=$((n + 1))
            fi
          done

          tag="${prefix}.${counter}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Auto-tag: ${tag}"

      - name: Create and push tag
        run: |
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # goreleaser runs BEFORE the stamp commit so that the release tag
      # points to HEAD (the feature commit) at the time goreleaser validates
      # git state. If we ran goreleaser after the stamp commit, HEAD would
      # have advanced past the tag and goreleaser would error:
      #   "git tag vX was not made against commit <sha>"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp plugin version
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # Update version in marketplace.json and plugin.json.
          # This runs after goreleaser so the stamp commit does not advance
          # HEAD past the release tag (which would break goreleaser validation).
          # The [skip ci] suffix prevents this push from triggering a new run.
          sed -i "s|\"version\": \".*\"|\"version\": \"${TAG}\"|g" \
            .claude-plugin/marketplace.json \
            plugins/slaude/.claude-plugin/plugin.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json plugins/slaude/.claude-plugin/plugin.json
          git diff --cached --quiet || git commit -m "chore: stamp plugin version ${TAG} [skip ci]"
          git push origin master
